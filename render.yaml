databases:
  - name: continuacare-db
    databaseName: continuacare
    user: continuacare
    plan: free

services:

  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: continuacare-backend
    runtime: python
    rootDir: packages/backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: continuacare-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BASETEN_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_SIP_TRUNK_ID
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_CALL_DELAY_SECONDS
        value: "15"
      - key: CARE_TEAM_PHONE_NUMBER
        value: "+17169107704"

  # ── Voice Agent (background worker) ─────────────────────────────────────────
  - type: worker
    name: continuacare-agent
    runtime: python
    rootDir: packages/agent
    buildCommand: pip install -r requirements.txt
    startCommand: python agent.py dev
    plan: starter
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_SIP_TRUNK_ID
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: CARE_TEAM_PHONE_NUMBER
        value: "+17169107704"
      - key: BACKEND_URL
        sync: false

  # ── Frontend (static site) ───────────────────────────────────────────────────
  - type: web
    name: continuacare-frontend
    runtime: static
    rootDir: packages/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_USE_MOCK
        value: "false"
      - key: VITE_API_URL
        sync: false
