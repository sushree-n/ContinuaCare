# ContinuaCare — free-tier Render Blueprint (frontend + backend + Postgres).
#
# The voice agent (packages/agent) is intentionally NOT deployed here: Render
# has no free tier for background workers, and it needs LiveKit + telephony.
# Run it locally (`python agent.py dev`) or on a paid worker separately.
#
# SINGLE SOURCE OF TRUTH FOR CONFIG:
#   All backend secrets live in ONE Render "environment group" below
#   (continuacare-env). After the first deploy, open that group in the Render
#   dashboard → "Add from .env" → paste your root .env. That's it — one file,
#   one place. render.yaml itself holds NO secrets (all marked sync: false).

databases:
  - name: continuacare-db
    databaseName: continuacare
    user: continuacare
    plan: free            # ⚠️ Render's free Postgres is DELETED after 30 days.
                          #    For a permanent free DB, create a Neon project
                          #    (neon.tech), delete this block, and set the
                          #    backend's DATABASE_URL to Neon's connstring.

# ── One env group = the single place all backend config lives ────────────────
# Populate it once by pasting your .env in the dashboard ("Add from .env").
envVarGroups:
  - name: continuacare-env
    envVars:
      - key: OPENROUTER_API_KEY          # summaries + billing docs (Claude via OpenRouter)
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: BASETEN_API_KEY             # triage (DeepSeek-V4-Pro)
        sync: false
      - key: LIVEKIT_URL                 # only used if you trigger live calls
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_SIP_TRUNK_ID
        sync: false
      - key: CARE_TEAM_PHONE_NUMBER
        value: "+17169107704"
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_CALL_DELAY_SECONDS
        value: "15"
      - key: BACKEND_URL                 # set to the backend's own https URL after 1st deploy
        sync: false

services:

  # ── Backend API (free web service; spins down after ~15 min idle) ───────────
  - type: web
    name: continuacare-backend
    runtime: python
    rootDir: packages/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    # Tables auto-create on startup (main.py lifespan → create_all), so no
    # alembic step needed for a fresh free deploy.
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: continuacare-db
          property: connectionString
      - fromGroup: continuacare-env

  # ── Frontend (static site — always free on Render) ──────────────────────────
  - type: web
    name: continuacare-frontend
    runtime: static
    rootDir: packages/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_USE_MOCK
        value: "false"
      - key: VITE_API_URL                # set to the backend's https URL after 1st deploy
        sync: false
